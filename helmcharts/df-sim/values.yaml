replicaCount: 1

image:
  registry: ghcr.io
  repository: tamfrost/df-sim
  pullPolicy: IfNotPresent
  tag: "c9b6e2d"

# GitHub Container Registry authentication
# Set githubToken to automatically create imagePullSecret
githubToken: ""
githubUsername: "tamfrost"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: df-sim.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: df-sim-tls
  #    hosts:
  #      - df-sim.local

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

command:
  - antenna-api
