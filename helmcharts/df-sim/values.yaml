replicaCount: 1

# image.registry, image.repository, and githubUsername MUST be provided via --set
# Helm will fail if these required values are missing
image:
  pullPolicy: IfNotPresent
  tag: "8b137ba"

# GitHub Container Registry authentication
# Set githubToken to automatically create imagePullSecret
githubToken: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# OpenShift Route configuration (preferred for OpenShift clusters)
# Disabled - oauth2-proxy handles routing
route:
  enabled: false
  host: "df-sim.apps-crc.testing"
  path: ""
  annotations: {}
  tls:
    enabled: true
    termination: edge  # edge, passthrough, or reencrypt
    insecureEdgeTerminationPolicy: Redirect  # Redirect HTTP to HTTPS

# Standard Kubernetes Ingress (use for non-OpenShift clusters)
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: df-sim.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: df-sim-tls
  #    hosts:
  #      - df-sim.local

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

command:
  - antenna-api
  - "8080"
