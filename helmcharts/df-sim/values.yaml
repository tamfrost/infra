replicaCount: 1

# image.registry, image.repository, and githubUsername MUST be provided via --set
# Helm will fail if these required values are missing
image:
  pullPolicy: IfNotPresent
  tag: "1b8e9b4"

# GitHub Container Registry authentication
# Set githubToken to automatically create imagePullSecret
githubToken: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80
  targetPort: 4180  # oauth2-proxy port
  appPort: 8080     # Application backend port

# OAuth2 Proxy configuration
oauth2Proxy:
  enabled: true
  image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
  clientID: "oauth2-proxy"
  clientSecret: "ZagakvF7MSlQw3e8myAluGtCynpef7Y0"
  cookieSecret: "P6TGLDH9R7klmYdzwPzlnv6v+fVFa9xO"
  oidcIssuerUrl: "https://keycloak-local.apps-crc.testing/realms/df-sim"
  # Empty value uses oauth2-proxy default login URL (no forced IDP hint)
  loginUrl: ""
  redirectUrl: "https://df-sim.apps-crc.testing/oauth2/callback"
  emailDomain: "*"
  sslInsecureSkipVerify: true
  skipProviderButton: true

# OpenShift Route configuration (preferred for OpenShift clusters)
# Disabled - nginx proxy handles routing and client cert auth
route:
  enabled: false
  host: "df-sim.apps-crc.testing"
  path: ""
  annotations: {}
  tls:
    enabled: true
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

# Standard Kubernetes Ingress (use for non-OpenShift clusters)
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: df-sim.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: df-sim-tls
  #    hosts:
  #      - df-sim.local

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

command:
  - antenna-api
  - "8080"
