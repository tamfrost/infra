{{- if .Values.macAddress }}
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: {{ include "df-nec2.fullname" . }}-matlab-mac
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "df-nec2.labels" . | nindent 4 }}
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "matlab-mac",
      "type": "bridge",
      "bridge": "matlab-br0",
      "ipam": {}
    }
{{- end }}
