replicaCount: 1

image:
  repository: ""  # Required: must be set via --set image.repository=...
  pullPolicy: Always
  tag: "12cafac"

github:
  pullSecret:
    create: true
    name: ghcr-secret
    registry: ""
    username: ""
    token: ""

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

# The image runs as non-root. fakemac.so handles MAC spoofing at the
# application layer via LD_PRELOAD, so root is not required.
# No explicit runAsUser — let OpenShift assign a UID from the restricted-v2
# SCC range (same pattern as df-proxy).
securityContext:
  runAsNonRoot: true

service:
  type: ClusterIP
  port: 8080

# MATLAB websocket port. It is only reached in-pod (the Flask server connects to
# localhost:30001), so it is exposed as a containerPort but not via the Service.
wsPort: 30001

# HTTP path used for startup / readiness probes.
probePath: /api/v1/ping

route:
  host: ""  # Required for Pomerium ingress — e.g. df-nec2.apps-crc.testing

acmeIssuerName: "clusterissuer-primkey-acme"


resources:
  limits:
    cpu: 4000m
    memory: 8Gi
  requests:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# OMP_NUM_THREADS matches the CPU limit so MATLAB's BLAS/LAPACK layer does not
# oversubscribe the host's cores and get CFS-throttled (the main cause of slow
# MATLAB in a CPU-limited pod).
env:
  - name: OMP_NUM_THREADS
    value: "4"

# MATLAB license is host-locked to MAC 02:42:ac:11:00:02 (host ID 0242ac110002).
# LD_PRELOAD in the image intercepts MAC lookups and returns this address to MATLAB.
macAddress: "02:42:ac:11:00:02"

# NetworkAttachmentDefinition for MAC address binding on the pod interface.
# Disabled by default — fakemac.so handles MAC spoofing at the application layer.
# Enable only if the cluster admission policy allows NAD creation.
networkAttachment:
  enabled: false

argocd: false

openshift:
  # Bind the anyuid SCC to the service account so the pod can run as root.
  # Set to false on non-OpenShift clusters.
  anyuidScc: true
