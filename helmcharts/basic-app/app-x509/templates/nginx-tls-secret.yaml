{{- $secretName := printf "%s-nginx-tls" .Values.appName -}}
{{- $sans := list (printf "%s-nginx" .Values.appName) (printf "%s-nginx.%s.svc" .Values.appName .Values.namespace) (printf "%s-nginx.%s.svc.cluster.local" .Values.appName .Values.namespace) -}}
{{- if .Values.route.host }}{{- $sans = append $sans .Values.route.host -}}{{- end }}
{{- if and .Values.nginxCaCert .Values.nginxCaKey }}
{{- $ca := buildCustomCert (.Values.nginxCaCert | b64enc) (.Values.nginxCaKey | b64enc) -}}
{{- $cert := genSignedCert (printf "%s-nginx" .Values.appName) nil $sans 365 $ca -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Values.namespace }}
type: kubernetes.io/tls
data:
  tls.crt: {{ printf "%s%s" $cert.Cert .Values.nginxCaCert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
{{- else if and .Values.acmeDirectoryUrl (ne .Values.acmeDirectoryUrl "-") }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $secretName }}
  namespace: {{ .Values.namespace }}
  annotations:
    cert-manager.io/issue-temporary-certificate: "true"
spec:
  secretName: {{ $secretName }}
  commonName: {{ printf "%s-nginx" .Values.appName }}
  dnsNames:
    {{- range $sans }}
    - {{ . }}
    {{- end }}
  issuerRef:
    name: {{ .Values.acmeIssuerName }}
    kind: ClusterIssuer
{{- else }}
{{- $existing := lookup "v1" "Secret" .Values.namespace $secretName -}}
{{- if not $existing.metadata }}
{{- $cert := genSelfSignedCert (printf "%s-nginx" .Values.appName) nil $sans 3650 -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Values.namespace }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
{{- end }}
{{- end }}
