{{- if and .Values.acmeDirectoryUrl (ne .Values.acmeDirectoryUrl "-") }}
{{- if not (lookup "cert-manager.io/v1" "ClusterIssuer" "" .Values.acmeIssuerName) }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.acmeIssuerName }}
spec:
  acme:
    server: {{ .Values.acmeDirectoryUrl }}
    privateKeySecretRef:
      name: {{ .Values.acmeIssuerName }}-acme-key
    solvers:
      - http01:
          ingress:
            class: nginx
{{- end }}
{{- end }}
