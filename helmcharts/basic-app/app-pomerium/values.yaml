appName: basic-app
namespace: basic-app

replicaCount: 1

image:
  registry: ""
  repository: ""
  tag: "c6dabaa"
  pullPolicy: Always

service:
  port: 3000

route:
  host: ""

# Path prefixes served WITHOUT authentication (public Pomerium route).
# Everything not listed here still requires login. Set to [] to make the
# whole app authenticated.
publicPaths:
  - /api/info

acmeIssuerName: "clusterissuer-primkey-acme"

appConfig:
  js: ""
  json: ""
  yaml: ""
