{{- $secretName := printf "%s-nginx-tls" .Values.appName -}}
{{- $existing := lookup "v1" "Secret" .Values.namespace $secretName -}}
{{- if $existing.metadata }}
# TLS secret already exists, skipping regeneration
{{- else }}
{{- $sans := list (printf "%s-nginx" .Values.appName) (printf "%s-nginx.%s.svc" .Values.appName .Values.namespace) (printf "%s-nginx.%s.svc.cluster.local" .Values.appName .Values.namespace) -}}
{{- $cert := genSelfSignedCert (printf "%s-nginx" .Values.appName) nil $sans 3650 -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Values.namespace }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
{{- end }}
