apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.appName }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.appName }}
  template:
    metadata:
      labels:
        app: {{ .Values.appName }}
    spec:
      containers:
        - name: app
          image: {{ required "image.registry is required" .Values.image.registry }}/{{ required "image.repository is required" .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.appPort }}

        - name: oauth2-proxy
          image: {{ .Values.oauth2Proxy.image }}
          imagePullPolicy: IfNotPresent
          args:
            - --provider=oidc
            - --email-domain={{ .Values.oauth2Proxy.emailDomain }}
            - --insecure-oidc-allow-unverified-email
            - --client-id={{ required "oauth2Proxy.clientID is required" .Values.oauth2Proxy.clientID }}
            - --client-secret-file=/etc/secret/clientsecret
            - --oidc-issuer-url={{ required "oauth2Proxy.oidcIssuerUrl is required" .Values.oauth2Proxy.oidcIssuerUrl }}
            - --upstream=http://127.0.0.1:{{ .Values.service.appPort }}
            - --redirect-url={{ required "oauth2Proxy.redirectUrl is required" .Values.oauth2Proxy.redirectUrl }}
            - --skip-provider-button={{ .Values.oauth2Proxy.skipProviderButton }}
            - --http-address=0.0.0.0:{{ .Values.service.proxyPort }}
            - --cookie-secret={{ required "oauth2Proxy.cookieSecret is required" .Values.oauth2Proxy.cookieSecret }}
            - --cookie-refresh={{ .Values.oauth2Proxy.cookieRefresh }}
            - --cookie-expire={{ .Values.oauth2Proxy.cookieExpire }}
            - --code-challenge-method={{ .Values.oauth2Proxy.codeChallengeMethod }}
            - --ssl-insecure-skip-verify={{ .Values.oauth2Proxy.sslInsecureSkipVerify }}
            - --flush-interval=1s
            {{- if .Values.oauth2Proxy.providerCaCert }}
            - --provider-ca-file=/etc/provider-ca/tls-ca-bundle.pem
            {{- end }}
            {{- if ne .Values.oauth2Proxy.allowedGroups "-" }}
            {{- range splitList "," .Values.oauth2Proxy.allowedGroups }}
            - --allowed-group={{ . | trim }}
            {{- end }}
            {{- end }}
          ports:
            - name: proxy
              containerPort: {{ .Values.service.proxyPort }}
          livenessProbe:
            httpGet:
              path: /ping
              port: proxy
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: proxy
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: client-secret
              mountPath: /etc/secret
              readOnly: true
            {{- if .Values.oauth2Proxy.providerCaCert }}
            - name: provider-ca
              mountPath: /etc/provider-ca
              readOnly: true
            {{- end }}
      volumes:
        - name: client-secret
          secret:
            secretName: {{ .Values.appName }}-client-secret
        {{- if .Values.oauth2Proxy.providerCaCert }}
        - name: provider-ca
          configMap:
            name: {{ .Values.appName }}-provider-ca
        {{- end }}
