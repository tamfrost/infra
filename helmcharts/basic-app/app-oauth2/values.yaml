appName: basic-app
namespace: basic-app

replicaCount: 1

image:
  registry: ""
  repository: ""
  tag: "c2e5f92"
  pullPolicy: Always

nginx:
  image: nginx:alpine

service:
  appPort: 3000
  proxyPort: 4180
  nginxPort: 8443

oauth2Proxy:
  image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
  clientID: ""
  clientSecret: ""
  cookieSecret: ""
  oidcIssuerUrl: ""
  redirectUrl: ""
  emailDomain: "*"
  sslInsecureSkipVerify: true
  skipProviderButton: true
  providerCaCert: ""
  allowedGroups: "-"
  cookieRefresh: "20m0s"
  cookieExpire: "30m0s"
  codeChallengeMethod: "S256"

acmeDirectoryUrl: "-"
acmeIssuerName: "internal-ca"

nginxCaCert: ""
nginxCaKey: ""

route:
  host: ""

appConfig:
  js: ""
  json: ""
  yaml: ""
