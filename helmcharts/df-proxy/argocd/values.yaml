# ArgoCD Application configuration
argocd:
  # Namespace where ArgoCD is installed
  namespace: argocd
  
  # Git credentials for the infra repo holding the Helm charts
  infraRepo:
    username: ""  # Injected from .env (any non-empty value works with a PAT)
    token: ""     # Injected from .env: INFRA_PAT_SECRET

  # Application settings
  application:
    # Name of the ArgoCD application
    name: df-proxy
    # Namespace where the application will be deployed (defaults to helm release namespace if not specified)
    namespace: ""
    # ArgoCD project (use "default" or specify your project)
    project: default

    # Helm chart source from the infra repo (git)
    source:
      # Infra repo URL (injected from .env: INFRA_REGISTRY)
      repoURL: ""
      # Path to the Helm chart within the infra repo (injected from .env: HELM_CHART_PATH/<chart>)
      path: ""
      # Git branch/tag/commit to track
      targetRevision: "HEAD"

      # Helm values overrides (GitHub token injected from .env)
      helm:
        values: ""
    
    
    # Destination cluster and namespace
    destination:
      # Kubernetes cluster (use "in-cluster" for the same cluster as ArgoCD)
      server: https://kubernetes.default.svc
      # Target namespace
      namespace: default
    
    # Sync policy
    syncPolicy:
      # Automatically sync when changes are detected
      automated:
        # Automatically create namespace if it doesn't exist
        prune: true
        # Allow empty resources
        selfHeal: true
        # Allow resources to be deleted
        allowEmpty: false
      
      # Sync options
      syncOptions:
        - CreateNamespace=true
        - PrunePropagationPolicy=foreground
        - PruneLast=true
        - RespectIgnoreDifferences=false
      
      # Retry policy
      retry:
        limit: 5
        backoff:
          duration: 5s
          factor: 2
          maxDuration: 3m
